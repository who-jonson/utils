packages:
  - packages/*

catalog:
  # Build & bundling tools
  '@rollup/plugin-typescript': ^12.3.0
  '@testing-library/vue': ^8.1.0
  '@types/fs-extra': ^11.0.4
  '@types/is-glob': ^4.0.4

  # Type definitions
  '@types/node': ^25.6.0
  '@types/throttle-debounce': ^5.0.2
  '@vitejs/plugin-vue': ^6.0.6
  '@vitest/ui': ^4.1.4
  '@whoj/eslint-config': ^7.5.2

  # Dev utilities
  bumpp: ^11.0.1
  c8: ^11.0.0

  # Runtime utilities
  change-case: ^5.4.4
  core-js: ^3.49.0
  cross-env: ^10.1.0
  dot-prop: ^10.1.0
  esbuild: ^0.28.0
  esbuild-register: ^3.6.0

  # Linting
  eslint: ^10.2.1
  eslint-plugin-testing-library: ^7.16.2
  esno: ^4.8.0
  fast-glob: ^3.3.3
  'fuse.js': ^7.0.0
  is-glob: ^4.0.3
  npm-run-all: ^4.1.5
  nuxt: ^4.4.2
  php-serialize: ^5.0.1
  postcss: ^8.5.10
  rimraf: ^6.1.3
  rollup: ^4.60.2
  rollup-plugin-dts: ^6.4.1
  rollup-plugin-esbuild: ^6.2.1
  rollup-plugin-node-externals: ^9.0.1
  rollup-plugin-postcss: ^4.0.2
  scule: ^1.3.0
  throttle-debounce: ^5.0.2
  tsup: ^8.5.1
  tsx: ^4.21.0

  # TypeScript tooling
  typescript: ~6.0.3
  unbuild: ^3.6.1
  unplugin: ^3.0.0
  vite: ^7.3.2
  vite-plugin-dts: ^4.5.4

  # Testing
  vitest: ^4.1.4

  # Framework (Vue 3)
  vue: ^3.5.32
  vue-router: ^5.0.4
  vue-tsc: ^3.2.7

catalogMode: strict

cleanupUnusedCatalogs: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - core-js
  - esbuild

peerDependencyRules:
  allowAny:
    - rollup
    - typescript
  ignoreMissing:
    - rollup
    - webpack
    - '@vue/compiler-sfc'
